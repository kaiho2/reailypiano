<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piano Keys Trainer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d001a;
      color: #eee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 20px 0 10px;
      font-size: 2.4rem;
      text-shadow: 0 0 15px #8a2be2;
    }
    #game-area {
      position: relative;
      width: 620px;
      height: 80vh;
      max-height: 720px;
      background: #111;
      border: 2px solid #444;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(138,43,226,0.4);
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      font-size: 1.5rem;
      pointer-events: none;
      text-shadow: 1px 1px 4px black;
    }
    #start-screen, #game-over {
      position: absolute;
      inset: 0;
      background: rgba(10,0,30,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      text-align: center;
      z-index: 10;
    }
    button {
      margin-top: 35px;
      padding: 16px 50px;
      font-size: 1.6rem;
      background: #8a2be2;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s;
    }
    button:hover {
      background: #9f51e8;
      transform: scale(1.08);
    }
    .hidden { display: none !important; }

    .keys-hint {
      margin-top: 20px;
      font-size: 1.3rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<h1>Piano Keys Trainer</h1>

<div id="game-area">
  <canvas id="c"></canvas>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Combo: <span id="combo">0</span>×</div>
  </div>

  <div id="start-screen">
    <div>PIANO KEYS TRAINER</div>
    <div class="keys-hint" style="font-size:1.4rem; margin:40px 0 20px;">
      Use keys: A S D F J K L ;<br>
      (C D E F G A B C)
    </div>
    <button id="start">START</button>
  </div>

  <div id="game-over" class="hidden">
    <div>GAME OVER</div>
    <div style="font-size:1.8rem; margin:30px 0;">
      Score: <span id="final-score">0</span><br>
      Max Combo: <span id="max-combo">0</span>×
    </div>
    <button id="restart">PLAY AGAIN</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl   = document.getElementById('score');
const comboEl   = document.getElementById('combo');
const finalScoreEl = document.getElementById('final-score');
const maxComboEl   = document.getElementById('max-combo');

let W, H;
function resize() {
  W = canvas.width  = 620;
  H = canvas.height = Math.min(window.innerHeight * 0.78, 720);
}
window.addEventListener('resize', resize);
resize();

let gameRunning = false;
let score = 0;
let combo = 0;
let maxCombo = 0;
let notes = [];
let pressed = new Set();
let lastSpawn = 0;

// Note setup ─────────────────────────────────────
const keys = ['A','S','D','F','J','K','L',';'];
const notesOrder = [0,1,2,3,4,5,6,7]; // C D E F G A B C
const laneWidth = W / keys.length;
const hitZoneY = H - 110;
const perfectZone = 35;   // pixels around hit line
const goodZone   = 70;

const keyToLane = {
  'a':0, 's':1, 'd':2, 'f':3,
  'j':4, 'k':5, 'l':6, ';':7,
  'A':0, 'S':1, 'D':2, 'F':3,
  'J':4, 'K':5, 'L':6, ':':7
};

class Note {
  constructor(lane) {
    this.lane = lane;
    this.y = -50;
    this.speed = 180 + Math.random()*80 + (score/40); // gradual speedup
    this.color = `hsl(${lane*45 + 200}, 90%, 65%)`;
    this.missed = false;
  }
  update(dt) {
    this.y += this.speed * dt;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(
      this.lane * laneWidth + 8,
      this.y - 20,
      laneWidth - 16,
      40
    );
    // letter hint
    ctx.fillStyle = 'white';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(
      keys[this.lane],
      this.lane * laneWidth + laneWidth/2,
      this.y + 8
    );
  }
}

// ─── Game loop ──────────────────────────────────
let lastTime = 0;
function loop(time) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = time;
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  ctx.fillStyle = 'rgba(13,0,26,0.18)';
  ctx.fillRect(0,0,W,H);

  // draw lanes
  ctx.strokeStyle = '#222';
  for (let i = 1; i < keys.length; i++) {
    const x = i * laneWidth;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  // hit zone line
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, hitZoneY);
  ctx.lineTo(W, hitZoneY);
  ctx.stroke();
  ctx.lineWidth = 1;

  // spawn notes
  if (time - lastSpawn > 1200 - score*1.2) {
    const lane = Math.floor(Math.random() * keys.length);
    notes.push(new Note(lane));
    lastSpawn = time;
  }

  // update & draw notes
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    n.update(dt);

    if (n.y > H + 50) {
      if (!n.missed) {
        combo = 0;
        comboEl.textContent = 0;
      }
      notes.splice(i,1);
      continue;
    }

    n.draw();

    // auto-miss if passed zone
    if (n.y > hitZoneY + goodZone && !n.missed) {
      n.missed = true;
      combo = 0;
      comboEl.textContent = 0;
    }
  }

  // check pressed keys
  for (const [key, lane] of Object.entries(keyToLane)) {
    if (pressed.has(key)) {
      // find closest note in this lane
      let closest = null;
      let minDist = Infinity;

      for (const n of notes) {
        if (n.lane === lane) {
          const dist = Math.abs(n.y - hitZoneY);
          if (dist < minDist) {
            minDist = dist;
            closest = n;
          }
        }
      }

      if (closest && minDist < goodZone) {
        let points = 50;
        let text = "GOOD";

        if (minDist < perfectZone) {
          points = 100;
          text = "PERFECT!";
          combo += 2;
        } else {
          combo += 1;
        }

        score += points * (1 + combo/20);
        scoreEl.textContent = Math.floor(score);

        combo = Math.min(combo, 999);
        comboEl.textContent = combo;
        if (combo > maxCombo) {
          maxCombo = combo;
        }

        // remove hit note
        notes = notes.filter(n => n !== closest);

        // visual feedback
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(lane*laneWidth, hitZoneY-60, laneWidth, 120);
      }
    }
  }

  requestAnimationFrame(loop);
}

// ─── Controls ───────────────────────────────────
window.addEventListener('keydown', e => {
  if (!e.repeat) {
    const k = e.key.toLowerCase() === ';' ? ';' : e.key;
    pressed.add(k);
  }
});

window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase() === ';' ? ';' : e.key;
  pressed.delete(k);
});

// ─── Start / Restart ────────────────────────────
function startGame() {
  notes = [];
  score = 0;
  combo = 0;
  maxCombo = 0;
  lastSpawn = 0;
  scoreEl.textContent = 0;
  comboEl.textContent = 0;
  gameRunning = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over').classList.add('hidden');
  lastTime = 0;
  requestAnimationFrame(loop);
}

function gameOver() {
  gameRunning = false;
  finalScoreEl.textContent = Math.floor(score);
  maxComboEl.textContent = maxCombo;
  document.getElementById('game-over').classList.remove('hidden');
}

// End game when too many notes missed (simple fail condition)
setInterval(() => {
  if (!gameRunning) return;
  const missedCount = notes.filter(n => n.y > hitZoneY + goodZone && !n.missed).length;
  if (missedCount >= 12) {
    gameOver();
  }
}, 2000);

document.getElementById('start').onclick = startGame;
document.getElementById('restart').onclick = startGame;

// Initial screen
document.getElementById('start-screen').classList.remove('hidden');

</script>
</body>
</html>
